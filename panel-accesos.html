<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Mi Panel">
<title>Mi Panel</title>
<style>
  * { -webkit-box-sizing: border-box; box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background-color: #12151c;
    font-family: -apple-system, "Helvetica Neue", Helvetica, Arial, sans-serif;
    -webkit-text-size-adjust: 100%;
  }
  body {
    padding: 30px 16px;
  }
  .cabecera {
    text-align: center;
    margin-bottom: 26px;
  }
  .cabecera h1 {
    color: #f4f1ea;
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }
  .cabecera p {
    color: #7d8493;
    font-size: 13px;
    margin-top: 4px;
  }
  .grid {
    display: -webkit-box;
    display: -webkit-flex;
    display: flex;
    -webkit-flex-wrap: wrap;
    flex-wrap: wrap;
    -webkit-justify-content: center;
    justify-content: center;
  }
  a.tile {
    display: block;
    text-decoration: none;
    width: 46%;
    margin: 2%;
    min-width: 130px;
    max-width: 170px;
    background-color: #1c2029;
    border-radius: 18px;
    padding: 22px 10px;
    text-align: center;
    border: 1px solid #2a2f3a;
    -webkit-transition: background-color 0.15s ease;
    transition: background-color 0.15s ease;
  }
  a.tile:active {
    background-color: #262b36;
  }
  .icono {
    width: 54px;
    height: 54px;
    line-height: 54px;
    border-radius: 16px;
    margin: 0 auto 10px auto;
    font-size: 24px;
    color: #ffffff;
    font-weight: 700;
  }
  .nombre {
    color: #e7e5df;
    font-size: 14px;
    font-weight: 500;
  }
  .pie {
    text-align: center;
    color: #4d5361;
    font-size: 11px;
    margin-top: 30px;
  }
</style>
</head>
<body>

  <div class="cabecera">
    <h1>Mi Panel</h1>
    <p>Accesos directos &middot; toca un icono para abrir</p>
  </div>

  <div class="grid">

    <a class="tile" href="oficina.html">
      <div class="icono" style="background-color:#8E5CF7;">O</div>
      <div class="nombre">Oficina</div>
    </a>

    <a class="tile" href="https://yabi-store.web.app/">
      <div class="icono" style="background-color:#F0A500;">Y</div>
      <div class="nombre">YA'BI STORE</div>
    </a>

    <a class="tile" href="https://m.youtube.com">
      <div class="icono" style="background-color:#FF0000;">&#9658;</div>
      <div class="nombre">YouTube</div>
    </a>

    <a class="tile" href="cotizador.html">
      <div class="icono" style="background-color:#16A34A;">$</div>
      <div class="nombre">Cotizador</div>
    </a>

    <a class="tile" href="tareas.html">
      <div class="icono" style="background-color:#3B82F6;">&#10003;</div>
      <div class="nombre">Tareas</div>
    </a>

    <a class="tile" href="inventario.html">
      <div class="icono" style="background-color:#06B6D4;">I</div>
      <div class="nombre">Inventario</div>
    </a>

  </div>

  <p class="pie">Guardado como app en tu iPad &middot; hecho a la medida</p>

</body>
</html>
