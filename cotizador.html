<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Cotizador">
<title>Cotizador</title>
<style>
  * { -webkit-box-sizing: border-box; box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background-color: #12151c;
    font-family: -apple-system, "Helvetica Neue", Helvetica, Arial, sans-serif;
    -webkit-text-size-adjust: 100%;
    color: #e7e5df;
  }
  body { padding: 16px; padding-bottom: 60px; }
  a.volver { display: inline-block; color: #7d8493; font-size: 13px; text-decoration: none; margin-bottom: 14px; }
  h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
  p.sub { color: #7d8493; font-size: 12px; margin-bottom: 16px; }

  .fila {
    background-color: #1c2029;
    border: 1px solid #2a2f3a;
    border-radius: 12px;
    padding: 10px;
    margin-bottom: 10px;
  }
  .campo { margin-bottom: 6px; }
  .campo label { display: block; font-size: 11px; color: #7d8493; margin-bottom: 3px; }
  .campo input {
    width: 100%;
    background-color: #12151c;
    border: 1px solid #2a2f3a;
    border-radius: 8px;
    color: #e7e5df;
    padding: 8px;
    font-size: 14px;
  }
  .subtotal-linea { text-align: right; font-size: 13px; color: #16A34A; font-weight: 700; margin-top: 4px; }
  .quitar { color: #e05a5a; font-size: 12px; text-align: right; display: block; margin-top: 4px; }

  .btn {
    display: inline-block;
    background-color: #262b36;
    color: #e7e5df;
    border: 1px solid #2a2f3a;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    margin-right: 6px;
    margin-bottom: 10px;
  }
  .btn.destaca { background-color: #16A34A; color: #ffffff; border: none; font-weight: 700; }

  .resumen {
    background-color: #1c2029;
    border: 1px solid #2a2f3a;
    border-radius: 12px;
    padding: 14px;
    margin-top: 10px;
  }
  .linea-resumen {
    display: -webkit-box; display: -webkit-flex; display: flex;
    -webkit-justify-content: space-between; justify-content: space-between;
    font-size: 14px; margin-bottom: 6px;
  }
  .linea-resumen.total { font-size: 18px; font-weight: 700; color: #16A34A; border-top: 1px solid #2a2f3a; padding-top: 8px; margin-top: 4px; }
  .toggle { display: -webkit-box; display: -webkit-flex; display: flex; -webkit-align-items: center; align-items: center; margin-bottom: 6px; font-size: 13px; }
  .toggle input { margin-right: 8px; width: 18px; height: 18px; }
</style>
</head>
<body>

  <a class="volver" href="index.html">&larr; Volver al panel</a>
  <h1>Cotizador</h1>
  <p class="sub">Agrega productos, calcula el total al instante. Ideal para cotizaciones r&aacute;pidas de YA'BI STORE.</p>

  <div id="filas"></div>

  <button class="btn destaca" onclick="agregarFila()">+ Agregar producto</button>
  <button class="btn" onclick="nuevaCotizacion()">Nueva cotizaci&oacute;n</button>

  <div class="resumen">
    <div class="toggle">
      <input type="checkbox" id="incluir-iva" onchange="calcularTotales()">
      <label for="incluir-iva">Incluir IVA (19%)</label>
    </div>
    <div class="linea-resumen"><span>Subtotal</span><span id="subtotal">$0</span></div>
    <div class="linea-resumen"><span>IVA</span><span id="iva">$0</span></div>
    <div class="linea-resumen total"><span>Total</span><span id="total">$0</span></div>
  </div>

<script>
  var contador = 0;

  function formatoDinero(n) {
    n = Math.round(n);
    var s = String(n);
    var out = '';
    var count = 0;
    var i;
    for (i = s.length - 1; i >= 0; i = i - 1) {
      out = s.charAt(i) + out;
      count = count + 1;
      if (count % 3 === 0 && i !== 0) { out = '.' + out; }
    }
    return '$' + out;
  }

  function agregarFila(producto, cantidad, precio) {
    contador = contador + 1;
    var id = contador;
    var div = document.createElement('div');
    div.className = 'fila';
    div.id = 'fila-' + id;
    div.innerHTML =
      '<div class="campo"><label>Producto</label><input type="text" id="prod-' + id + '" oninput="calcularTotales()" value="' + (producto || '') + '"></div>' +
      '<div class="campo"><label>Cantidad</label><input type="number" id="cant-' + id + '" oninput="calcularTotales()" value="' + (cantidad || 1) + '"></div>' +
      '<div class="campo"><label>Precio unitario</label><input type="number" id="precio-' + id + '" oninput="calcularTotales()" value="' + (precio || 0) + '"></div>' +
      '<div class="subtotal-linea" id="sub-' + id + '">$0</div>' +
      '<a class="quitar" onclick="quitarFila(' + id + ')">Quitar</a>';
    document.getElementById('filas').appendChild(div);
    calcularTotales();
  }

  function quitarFila(id) {
    var el = document.getElementById('fila-' + id);
    if (el) { el.parentNode.removeChild(el); }
    calcularTotales();
  }

  function calcularTotales() {
    var filas = document.getElementById('filas').children;
    var subtotal = 0;
    var i;
    for (i = 0; i < filas.length; i = i + 1) {
      var id = filas[i].id.split('-')[1];
      var cant = parseFloat(document.getElementById('cant-' + id).value) || 0;
      var precio = parseFloat(document.getElementById('precio-' + id).value) || 0;
      var sub = cant * precio;
      document.getElementById('sub-' + id).innerHTML = formatoDinero(sub);
      subtotal = subtotal + sub;
    }
    var conIva = document.getElementById('incluir-iva').checked;
    var iva = conIva ? subtotal * 0.19 : 0;
    document.getElementById('subtotal').innerHTML = formatoDinero(subtotal);
    document.getElementById('iva').innerHTML = formatoDinero(iva);
    document.getElementById('total').innerHTML = formatoDinero(subtotal + iva);
    guardar();
  }

  function nuevaCotizacion() {
    if (confirm('Esto borra la cotizaci\u00f3n actual. Continuar?')) {
      document.getElementById('filas').innerHTML = '';
      document.getElementById('incluir-iva').checked = false;
      contador = 0;
      agregarFila();
    }
  }

  function guardar() {
    try {
      var filas = document.getElementById('filas').children;
      var datos = [];
      var i;
      for (i = 0; i < filas.length; i = i + 1) {
        var id = filas[i].id.split('-')[1];
        datos.push({
          p: document.getElementById('prod-' + id).value,
          c: document.getElementById('cant-' + id).value,
          pr: document.getElementById('precio-' + id).value
        });
      }
      localStorage.setItem('cotizador_datos', JSON.stringify(datos));
      localStorage.setItem('cotizador_iva', document.getElementById('incluir-iva').checked ? '1' : '0');
    } catch (e) {}
  }

  function cargar() {
    try {
      var val = localStorage.getItem('cotizador_datos');
      var iva = localStorage.getItem('cotizador_iva');
      if (iva === '1') { document.getElementById('incluir-iva').checked = true; }
      if (val) {
        var datos = JSON.parse(val);
        if (datos.length > 0) {
          var i;
          for (i = 0; i < datos.length; i = i + 1) {
            agregarFila(datos[i].p, datos[i].c, datos[i].pr);
          }
          return;
        }
      }
    } catch (e) {}
    agregarFila();
  }

  cargar();
</script>

</body>
</html>
