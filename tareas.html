<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Tareas">
<title>Tareas</title>
<style>
  * { -webkit-box-sizing: border-box; box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background-color: #12151c;
    font-family: -apple-system, "Helvetica Neue", Helvetica, Arial, sans-serif;
    -webkit-text-size-adjust: 100%;
    color: #e7e5df;
  }
  body { padding: 16px; padding-bottom: 60px; }
  a.volver { display: inline-block; color: #7d8493; font-size: 13px; text-decoration: none; margin-bottom: 14px; }
  h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
  p.sub { color: #7d8493; font-size: 12px; margin-bottom: 16px; }

  .agregar {
    display: -webkit-box; display: -webkit-flex; display: flex;
    margin-bottom: 14px;
  }
  .agregar input {
    -webkit-box-flex: 1; -webkit-flex: 1; flex: 1;
    background-color: #1c2029;
    border: 1px solid #2a2f3a;
    border-radius: 8px 0 0 8px;
    color: #e7e5df;
    padding: 12px;
    font-size: 14px;
  }
  .agregar button {
    background-color: #3B82F6;
    color: #ffffff;
    border: none;
    border-radius: 0 8px 8px 0;
    padding: 0 18px;
    font-size: 20px;
    font-weight: 700;
  }

  .contador { font-size: 12px; color: #7d8493; margin-bottom: 10px; }

  .tarea {
    display: -webkit-box; display: -webkit-flex; display: flex;
    -webkit-align-items: center; align-items: center;
    background-color: #1c2029;
    border: 1px solid #2a2f3a;
    border-radius: 10px;
    padding: 12px;
    margin-bottom: 8px;
  }
  .tarea input[type=checkbox] { width: 20px; height: 20px; margin-right: 10px; }
  .tarea span {
    -webkit-box-flex: 1; -webkit-flex: 1; flex: 1;
    font-size: 15px;
  }
  .tarea.completa span { color: #4d5361; text-decoration: line-through; }
  .tarea a.borrar { color: #e05a5a; font-size: 18px; padding-left: 10px; }

  .btn {
    display: inline-block;
    background-color: #262b36;
    color: #e7e5df;
    border: 1px solid #2a2f3a;
    border-radius: 8px;
    padding: 9px 14px;
    font-size: 12px;
    margin-top: 6px;
  }
</style>
</head>
<body>

  <a class="volver" href="index.html">&larr; Volver al panel</a>
  <h1>Tareas</h1>
  <p class="sub">Lista de pendientes, guardada en este iPad.</p>

  <div class="agregar">
    <input type="text" id="nueva-tarea" placeholder="Escribe una tarea..." onkeypress="if(event.keyCode===13){agregarTarea();}">
    <button onclick="agregarTarea()">+</button>
  </div>

  <div class="contador" id="contador">0 pendientes</div>

  <div id="lista-tareas"></div>

  <button class="btn" onclick="limpiarCompletadas()">Limpiar completadas</button>

<script>
  var tareas = [];

  function cargar() {
    try {
      var val = localStorage.getItem('tareas_lista');
      tareas = val ? JSON.parse(val) : [];
    } catch (e) { tareas = []; }
    dibujar();
  }

  function guardar() {
    try {
      localStorage.setItem('tareas_lista', JSON.stringify(tareas));
    } catch (e) {}
  }

  function agregarTarea() {
    var input = document.getElementById('nueva-tarea');
    var texto = input.value;
    if (!texto || texto.replace(/\s/g, '') === '') { return; }
    tareas.push({ texto: texto, hecha: false });
    input.value = '';
    guardar();
    dibujar();
  }

  function marcarTarea(i) {
    tareas[i].hecha = !tareas[i].hecha;
    guardar();
    dibujar();
  }

  function borrarTarea(i) {
    tareas.splice(i, 1);
    guardar();
    dibujar();
  }

  function limpiarCompletadas() {
    if (!confirm('Borrar todas las tareas completadas?')) { return; }
    var nuevas = [];
    var i;
    for (i = 0; i < tareas.length; i = i + 1) {
      if (!tareas[i].hecha) { nuevas.push(tareas[i]); }
    }
    tareas = nuevas;
    guardar();
    dibujar();
  }

  function dibujar() {
    var cont = document.getElementById('lista-tareas');
    var html = '';
    var pendientes = 0;
    var i;
    for (i = 0; i < tareas.length; i = i + 1) {
      if (!tareas[i].hecha) { pendientes = pendientes + 1; }
      html = html + '<div class="tarea' + (tareas[i].hecha ? ' completa' : '') + '">' +
        '<input type="checkbox" ' + (tareas[i].hecha ? 'checked' : '') + ' onchange="marcarTarea(' + i + ')">' +
        '<span>' + tareas[i].texto + '</span>' +
        '<a class="borrar" onclick="borrarTarea(' + i + ')">&times;</a>' +
        '</div>';
    }
    cont.innerHTML = html;
    document.getElementById('contador').innerHTML = pendientes + ' pendiente' + (pendientes === 1 ? '' : 's') + ' de ' + tareas.length;
  }

  cargar();
</script>

</body>
</html>
